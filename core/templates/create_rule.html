<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Create Rule</h2>

    <form method="POST"> {% csrf_token %}
        <label>Rule Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Rule Type:</label><br>
        <select name="rule_type">
            <option value="disable_cod_min_cart">Disable COD below cart value</option>
            <option value="add_cod_fee">Add COD fee</option>
        </select><br><br>

        <label>Min Cart Value:</label><br>
        <input type="number" name="min_cart_value"><br><br>

        <label>Select Shipping Method to Hide:</label><br>
        <select name="shipping_method"> {% for m in methods %}
            <option value="{{ m }}">{{ m }}</option> {% endfor %}
        </select> <br><br>

        <button type="submit">Save Rule</button>
    </form>
</body>

</html>
