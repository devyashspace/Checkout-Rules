query RunInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      deliveryAddress {
        countryCode
      }
      deliveryOptions {
        handle
        title
      }
    }
  }

  deliveryCustomization {
    metafield(
      namespace: "$app:hide-shipping"
      key: "function-configuration"
    ) {
      jsonValue
    }
  }
}