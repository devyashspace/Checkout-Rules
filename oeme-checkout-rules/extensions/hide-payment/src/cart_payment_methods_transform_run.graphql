query RunInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      deliveryAddress {
        countryCode
      }
    }
  }

  paymentMethods {
    id
    name
  }

  paymentCustomization {
    metafield(
      namespace: "$app:hide-payment"
      key: "function-configuration"
    ) {
      jsonValue
    }
  }
}